<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0f172a">
<link rel="manifest" href="manifest.json">
<title>智能家居管家</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/5.5.0/mqtt.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,-apple-system,sans-serif;background:#0b1120;color:#e2e8f0;min-height:100vh}
.topbar{background:linear-gradient(135deg,#1e3a5f,#0b1120);border-bottom:1px solid #1e293b;padding:12px 18px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.topbar h1{font-size:1.05rem;font-weight:700;display:flex;align-items:center;gap:8px}
.topbar .dot{width:10px;height:10px;border-radius:50%;background:#ef4444;display:inline-block}
.topbar .dot.live{background:#22c55e;box-shadow:0 0 8px #22c55e}
.container{max-width:820px;margin:0 auto;padding:12px 16px 40px}
.section{margin:18px 0}
.section-title{font-size:.7rem;text-transform:uppercase;letter-spacing:.08em;color:#64748b;margin:12px 0 6px;padding-left:2px;font-weight:700}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.grid4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px}
@media(max-width:600px){.grid4{grid-template-columns:1fr 1fr}}
.card{background:#111827;border:1px solid #1e293b;border-radius:14px;padding:14px;transition:.2s}
.card:hover{border-color:#334155}
.sensor{text-align:center}
.sensor .icon{font-size:1.6rem;margin-bottom:2px}
.sensor .val{font-size:1.7rem;font-weight:800}
.sensor .lbl{font-size:.68rem;color:#64748b;margin-top:2px}
.sensor .tag{font-size:.62rem;margin-top:4px;display:inline-block;padding:2px 8px;border-radius:8px}
.tag-ok{background:#064e3b;color:#6ee7b7}
.tag-warn{background:#451a03;color:#fbbf24}
.tag-bad{background:#450a0a;color:#fca5a5}
.actuator{display:flex;align-items:center;justify-content:space-between}
.actuator .info{display:flex;align-items:center;gap:10px}
.actuator .icon{font-size:1.3rem}
.actuator .name{font-weight:600;font-size:.82rem}
.actuator .st{font-size:.65rem;color:#64748b}
.toggle{position:relative;width:46px;height:24px;flex-shrink:0}
.toggle input{display:none}
.toggle .sl{position:absolute;inset:0;background:#334155;border-radius:24px;cursor:pointer;transition:.25s}
.toggle .sl::before{content:'';position:absolute;width:18px;height:18px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.25s}
.toggle input:checked+.sl{background:#3b82f6}
.toggle input:checked+.sl::before{transform:translateX(22px)}
.sys-row{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;padding:4px 0}
.btn{padding:7px 16px;border:none;border-radius:9px;font-size:.75rem;font-weight:600;cursor:pointer;color:#fff;transition:.2s}
.btn-blue{background:#3b82f6}.btn-blue:hover{background:#2563eb}
.btn-red{background:#dc2626}.btn-red:hover{background:#b91c1c}
.foot{text-align:center;color:#475569;font-size:.65rem;padding:20px 0 40px}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1e293b;border:1px solid #334155;padding:10px 20px;border-radius:20px;font-weight:600;z-index:1000;animation:fadeUp .3s}
@keyframes fadeUp{from{opacity:0;transform:translateX(-50%) translateY(16px)}}
.log{max-height:120px;overflow-y:auto;font-size:.68rem;padding:8px 0}
.log .ev{padding:5px 10px;border-left:3px solid #1e293b;margin:2px 0;color:#64748b}
.log .ev.warn{border-color:#f59e0b}
.log .ev.danger{border-color:#ef4444}
.log .ev .time{color:#475569;margin-right:6px;font-family:monospace}
</style>
</head>
<body>

<div class="topbar">
  <h1>🏠 智能家居管家</h1>
  <span id="stBadge" style="font-size:.68rem;color:#64748b">
    <span class="dot" id="dot"></span> <span id="stText">连接中...</span>
  </span>
</div>

<div class="container">
  <!-- 传感器 -->
  <div class="section">
    <div class="section-title">📡 环境监测</div>
    <div class="grid4">
      <div class="card sensor" id="tc">
        <div class="icon">🌡️</div>
        <div class="val" id="tv">--</div>
        <div class="lbl">温度 °C</div>
        <div class="tag tag-ok" id="tt">--</div>
      </div>
      <div class="card sensor" id="hc">
        <div class="icon">💧</div>
        <div class="val" id="hv">--</div>
        <div class="lbl">空气湿度 %</div>
      </div>
      <div class="card sensor" id="sc">
        <div class="icon">🌱</div>
        <div class="val" id="sv">--</div>
        <div class="lbl">土壤湿度 %</div>
      </div>
      <div class="card sensor" id="pc">
        <div class="icon">👤</div>
        <div class="val" id="pv">--</div>
        <div class="lbl">人体感应</div>
      </div>
    </div>
  </div>

  <!-- 执行器 -->
  <div class="section">
    <div class="section-title">🎮 执行器控制</div>
    <div class="grid2" id="acts"></div>
  </div>

  <!-- 系统 -->
  <div class="section">
    <div class="section-title">🛡️ 系统设置</div>
    <div class="card">
      <div class="sys-row">
        <span style="font-size:.82rem;font-weight:600">🛡️ 布防模式</span>
        <label class="toggle"><input type="checkbox" id="alarmToggle" checked onchange="ctl('alarmActive',this.checked)"><span class="sl"></span></label>
      </div>
      <div class="sys-row">
        <span style="font-size:.82rem;font-weight:600">🤖 自动联动</span>
        <label class="toggle"><input type="checkbox" id="autoToggle" checked onchange="ctl('autoMode',this.checked)"><span class="sl"></span></label>
      </div>
      <div class="sys-row">
        <span style="font-size:.82rem;font-weight:600">📋 事件日志</span>
        <button class="btn btn-blue" onclick="logArea.scrollTop=0" style="font-size:.65rem;padding:4px 10px">刷新</button>
      </div>
      <div class="log" id="logArea">
        <div class="ev"><span class="time">--:--:--</span>等待数据...</div>
      </div>
    </div>
  </div>

  <div class="foot">
    智能物联网家居系统 · ESP32 + 华为云IoT + 巴法云<br>
    2026 物联网课程设计作品
  </div>
</div>

<script>
const acts=[
  {id:'led',name:'LED警示灯',icon:'🔴'},
  {id:'relay',name:'继电器1 (门锁)',icon:'⚡'},
  {id:'relay2',name:'继电器2 (灌溉)',icon:'🔧'},
  {id:'buzzer',name:'蜂鸣报警器',icon:'🔊'}
];
document.getElementById('acts').innerHTML=acts.map(a=>
  `<div class="card actuator">
    <div class="info"><span class="icon">${a.icon}</span><div>
    <div class="name">${a.name}</div>
    <div class="st" id="${a.id}State">--</div></div></div>
    <label class="toggle"><input type="checkbox" id="${a.id}Toggle" onchange="ctl('${a.id}',this.checked)"><span class="sl"></span></label>
  </div>`
).join('');

const BROKER='wss://broker.emqx.io:8084/mqtt';
const TOPIC_STATUS='smarthome/esp32_002/status';
const TOPIC_CONTROL='smarthome/esp32_002/control';
let mq;
function conn(){
  mq=mqtt.connect(BROKER,{clientId:'web_'+Math.random().toString(16).slice(2,10),clean:true,reconnectPeriod:5000});
  mq.on('connect',()=>{
    mq.subscribe(TOPIC_STATUS,{qos:0});
    document.getElementById('dot').className='dot live';
    document.getElementById('stText').textContent='在线';
    addLog('系统已连接');
  });
  mq.on('message',(t,msg)=>{
    try{
      let d=JSON.parse(msg.toString());
      if(d.services)d.services.forEach(s=>{if(s.properties)Object.assign(d,s.properties)});
      upd(d);
    }catch(e){}
  });
  mq.on('close',()=>{
    document.getElementById('dot').className='dot';
    document.getElementById('stText').textContent='离线';
  });
}
function upd(d){
  if(d.temperature!==undefined){
    document.getElementById('tv').textContent=d.temperature.toFixed(1);
    const tt=document.getElementById('tt');
    if(d.temperature>35){tt.textContent='⚠ 高温';tt.className='tag tag-bad'}
    else if(d.temperature>30){tt.textContent='偏热';tt.className='tag tag-warn'}
    else{tt.textContent='正常';tt.className='tag tag-ok'}
    document.getElementById('tc').style.borderColor=d.temperature>35?'#ef4444':d.temperature>30?'#f59e0b':'#1e293b';
  }
  if(d.humidity!==undefined)document.getElementById('hv').textContent=d.humidity.toFixed(1);
  if(d.soil_moisture!==undefined){
    document.getElementById('sv').textContent=d.soil_moisture;
    document.getElementById('sc').style.borderColor=d.soil_moisture<30?'#f59e0b':'#1e293b';
  }
  if(d.motion!==undefined){
    document.getElementById('pv').textContent=d.motion?'🚨 有人':'正常';
    document.getElementById('pv').style.color=d.motion?'#ef4444':'#e2e8f0';
    document.getElementById('pc').style.borderColor=d.motion?'#ef4444':'#1e293b';
  }
  acts.forEach(a=>{
    if(d[a.id]!==undefined&&d[a.id]!==null){
      const v=!!d[a.id];
      document.getElementById(a.id+'Toggle').checked=v;
      document.getElementById(a.id+'State').textContent=v?'● 已开启':'○ 已关闭';
    }
  });
  if(d.alarmActive!==undefined)document.getElementById('alarmToggle').checked=!!d.alarmActive;
  if(d.autoMode!==undefined)document.getElementById('autoToggle').checked=!!d.autoMode;
}
function ctl(dev,val){
  if(!mq||!mq.connected)return toast('设备离线');
  const c={};c[dev]=val;
  mq.publish(TOPIC_CONTROL,JSON.stringify(c),{qos:0});
  toast('已发送');
}
function addLog(txt,level){
  const el=document.getElementById('logArea');
  const now=new Date().toTimeString().slice(0,8);
  const d=document.createElement('div');
  d.className='ev'+(level==='warn'?' warn':level==='danger'?' danger':'');
  d.innerHTML=`<span class="time">${now}</span>${txt}`;
  el.insertBefore(d,el.firstChild);
  while(el.children.length>40)el.removeChild(el.lastChild);
}
function toast(msg){
  let e=document.querySelector('.toast');
  if(!e){e=document.createElement('div');e.className='toast';document.body.appendChild(e)}
  e.textContent=msg;clearTimeout(e._t);e._t=setTimeout(()=>{if(e)e.remove()},2500);
}
conn();
</script>
</body>
</html>
